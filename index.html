<!DOCTYPE html>
<html>

<head>
  <title>Проект "Комменты"</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container">
    <ul class="comments"></ul>
    <div class="add-form">
      <input type="text" class="add-form-name" placeholder="Введите ваше имя" />
      <textarea class="add-form-text" placeholder="Введите ваш комментарий" rows="4"></textarea>
      <div class="add-form-row">
        <button class="add-form-button">Написать</button>
      </div>
    </div>
  </div>
</body>
<script>
  "use strict";
  const comments = [
    {
      name: "Глеб Фокин",
      date: "12.02.22 12:18",
      text: "Это будет первый комментарий на этой странице",
      likesCount: 3,
      isLiked: false
    },
    {
      name: "Варвара Н.",
      date: "13.02.22 19:22",
      text: "Мне нравится как оформлена эта страница!",
      likesCount: 75,
      isLiked: true
    }
  ];
  const commentsList = document.querySelector('.comments');
  const addButton = document.querySelector('.add-form-button');
  const nameInput = document.querySelector('.add-form-name');
  const commentInput = document.querySelector('.add-form-text');
  function escapeHtml(text) {
    return text
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }
  function renderComments() {
    commentsList.innerHTML = comments.map(function (comment, index) {
      return `
        <li class="comment" data-index="${index}">
          <div class="comment-header">
            <div>${escapeHtml(comment.name)}</div>
            <div>${comment.date}</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">${escapeHtml(comment.text)}</div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">${comment.likesCount}</span>
              <button class="like-button ${comment.isLiked ? '-active-like' : ''}" data-index="${index}"></button>
            </div>
          </div>
        </li>
      `;
    }).join('');
  }
  commentsList.addEventListener('click', function (event) {
    const likeButton = event.target.closest('.like-button');
    if (likeButton) {
      const index = Number(likeButton.dataset.index);
      comments[index].isLiked = !comments[index].isLiked;
      comments[index].likesCount += comments[index].isLiked ? 1 : -1;
      renderComments();
      return;
    }
    const commentCard = event.target.closest('.comment');
    if (commentCard) {
      const index = Number(commentCard.dataset.index);
      nameInput.value = comments[index].name;
      commentInput.value = '> ' + comments[index].text;
    }
  });
  addButton.addEventListener('click', function () {
    const name = nameInput.value.trim();
    const comment = commentInput.value.trim();
    if (name === '') { alert('Введите имя'); return; }
    if (comment === '') { alert('Введите комментарий'); return; }
    const now = new Date();
    const day = String(now.getDate()).padStart(2, '0');
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const year = String(now.getFullYear()).slice(2);
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    comments.push({
      name: name,
      date: `${day}.${month}.${year} ${hours}:${minutes}`,
      text: comment,
      likesCount: 0,
      isLiked: false
    });
    renderComments();
    nameInput.value = '';
    commentInput.value = '';
  });
  renderComments();
</script>

</html>
